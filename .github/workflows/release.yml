name: Release

# Tag a release with: git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # A tag that disagrees with Cargo.toml would ship a tarball named v0.2.0
  # containing a binary that reports `--version 0.1.0`. That is confusing and
  # awkward to retract once people have downloaded it, so fail before spending
  # any build minutes.
  verify:
    name: Verify tag matches Cargo.toml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - if: startsWith(github.ref, 'refs/tags/')
        run: |
          manifest=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)
          tag="${GITHUB_REF_NAME#v}"
          if [ "$manifest" != "$tag" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match Cargo.toml version $manifest"
            exit 1
          fi
          echo "OK: tag $GITHUB_REF_NAME matches Cargo.toml version $manifest"

  build:
    name: Build ${{ matrix.target }}
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
          - target: aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install cross
        run: cargo install cross --locked

      # musl and static linking on purpose: the machine that just OOMed is
      # frequently missing a toolchain, a matching glibc, or both.
      - name: Build
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Package
        run: |
          staging="oom-tui-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "$staging"
          cp target/${{ matrix.target }}/release/oom-tui "$staging/"
          cp README.md LICENSE "$staging/"
          tar czf "$staging.tar.gz" "$staging"
          sha256sum "$staging.tar.gz" > "$staging.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            *.tar.gz
            *.tar.gz.sha256

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
          generate_release_notes: true
