name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: Test (stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      # Tests run before the linters on purpose. A style lint failing must not
      # hide whether the code actually works - that is the more important
      # signal, and a skipped test step tells you nothing.
      - name: Test
        run: cargo test --all-features
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features

  # The README advertises a minimum supported Rust version. An unverified MSRV
  # claim is worse than no claim, so it gets its own job.
  msrv:
    name: MSRV (1.75)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.75.0
      - uses: Swatinem/rust-cache@v2
      # --locked so the committed Cargo.lock is what actually gets verified.
      - run: cargo check --locked --all-targets

  # "Download one file and run it on the broken box" is the whole distribution
  # story, and the broken box has no Rust toolchain. Prove the static builds
  # work on every push rather than discovering it at release time.
  build-cross:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install cross
        run: cargo install cross --locked
      - name: Build static binary
        run: cross build --release --target ${{ matrix.target }}
